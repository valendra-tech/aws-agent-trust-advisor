name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - os: linux
            goos: linux
            goarch: amd64
            ext: ""
          - os: windows
            goos: windows
            goarch: amd64
            ext: ".exe"
          - os: macos
            goos: darwin
            goarch: amd64
            ext: ""
          - os: macos
            goos: darwin
            goarch: arm64
            ext: ""
          - os: linux
            goos: linux
            goarch: arm64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build ${{ matrix.os }} binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          BIN_NAME=aws-agent-trust-advisor_${{ matrix.os }}_${{ matrix.goarch }}${{ matrix.ext }}
          go build -o "dist/${BIN_NAME}" .

      - name: Upload artifact ${{ matrix.os }}
        uses: actions/upload-artifact@v5
        with:
          name: aws-agent-trust-advisor_${{ matrix.os }}_${{ matrix.goarch }}
          path: dist/aws-agent-trust-advisor_${{ matrix.os }}_${{ matrix.goarch }}${{ matrix.ext }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.4.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
